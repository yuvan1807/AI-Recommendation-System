        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Premium Animated Background */
        .food-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 30%, #1a0a1a 0%, #0a0a0a 100%);
            z-index: -3;
        }

        .food-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(255,107,74,0.12), transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(255,180,74,0.12), transparent 50%);
            z-index: -2;
            animation: foodPulse 8s ease infinite;
        }

        @keyframes foodPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Floating Food Particles */
        .food-particle {
            position: fixed;
            font-size: 1rem;
            opacity: 0.1;
            pointer-events: none;
            animation: floatFood 20s linear infinite;
            z-index: -1;
        }

        @keyframes floatFood {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 25px 50px;
            position: relative;
            z-index: 2;
        }

        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            padding: 12px 28px;
            border-radius: 60px;
            text-decoration: none;
            color: white;
            margin-bottom: 40px;
            transition: all 0.3s ease;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .back-btn:hover {
            background: linear-gradient(135deg, #ff6b4a, #ffb44a);
            transform: translateX(-8px);
        }

        /* Header */
        .premium-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .food-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, rgba(255,107,74,0.2), rgba(255,180,74,0.2));
            backdrop-filter: blur(20px);
            padding: 10px 28px;
            border-radius: 60px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,107,74,0.3);
            animation: foodBorderPulse 2s infinite;
        }

        @keyframes foodBorderPulse {
            0%, 100% { border-color: rgba(255,107,74,0.3); box-shadow: 0 0 0 0 rgba(255,107,74,0.2); }
            50% { border-color: rgba(255,107,74,0.8); box-shadow: 0 0 25px rgba(255,107,74,0.3); }
        }

        .gradient-text {
            background: linear-gradient(135deg, #ff6b4a, #ffb44a, #ff4a9e);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 4s ease infinite;
        }

        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            font-family: 'Orbitron', monospace;
        }

        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
        }

        /* Veg/Non-Veg Toggle Slider */
        .toggle-section {
            background: rgba(15, 15, 35, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 10px;
            margin-bottom: 30px;
            display: inline-flex;
            width: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .toggle-switch {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 50px;
            padding: 5px;
        }

        .toggle-option {
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-option.veg {
            color: #4aff9e;
        }

        .toggle-option.nonveg {
            color: #ff6b4a;
        }

        .toggle-option.active {
            background: linear-gradient(135deg, #ff6b4a, #ffb44a);
            color: #000;
            box-shadow: 0 5px 15px rgba(255,107,74,0.3);
        }

        .toggle-option.veg.active {
            background: linear-gradient(135deg, #4aff9e, #ffb44a);
        }

        /* Cuisine Section */
        .cuisine-section {
            background: rgba(15, 15, 35, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 35px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .section-icon {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .cuisine-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .cuisine-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 35px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .cuisine-btn:hover {
            background: rgba(255,107,74,0.2);

        }

        .cuisine-btn.active {

            color: #000;
            border-color: transparent;
        }

        .foods-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));

            max-height: 500px;

        }

        .food-card {

        .food-veg-badge {

        }

        .food-price {

            color: #ffb44a;
        }

            padding: 20px 30px;
            text-align: center;
            border: 1px solid rgba(255,107,74,0.3);
            margin: 25px 0;
            backdrop-filter: blur(20px);
            display: none;
        }

        /* Restaurants Grid */

        .restaurant-card {

</head>

                    { name: "Chicken Popcorn", icon: "🍗", price: "₹90", veg: false },
                    { name: "Zinger Burger", icon: "🍔", price: "₹180", veg: false }
                ]
            },
            streetfood: {
                veg: [
                    { name: "Pani Puri", icon: "🍘", price: "₹40", veg: true },
                    { name: "Bhel Puri", icon: "🍲", price: "₹50", veg: true },
                    { name: "Sev Puri", icon: "🍘", price: "₹50", veg: true },
                    { name: "Dahi Puri", icon: "🍘", price: "₹60", veg: true },
                    { name: "Vada Pav", icon: "🍔", price: "₹30", veg: true },
                    { name: "Samosa", icon: "🥟", price: "₹20", veg: true },
                    { name: "Kachori", icon: "🥟", price: "₹25", veg: true },
                    { name: "Aloo Tikki", icon: "🍘", price: "₹40", veg: true },
                    { name: "Pav Bhaji", icon: "🍞", price: "₹80", veg: true },
                    { name: "Chole Kulche", icon: "🥙", price: "₹70", veg: true },
                    { name: "Golgappe", icon: "🍘", price: "₹30", veg: true },
                    { name: "Dahi Bhalla", icon: "🍘", price: "₹60", veg: true }
                ],
                nonveg: [
                    { name: "Egg Roll", icon: "🌯", price: "₹70", veg: false },
                    { name: "Chicken Roll", icon: "🌯", price: "₹100", veg: false },
                    { name: "Seekh Kebab Roll", icon: "🌯", price: "₹120", veg: false },
                    { name: "Chicken Tikka Roll", icon: "🌯", price: "₹110", veg: false }
                ]
            }
        };

        // Restaurant recommendations for each food with Zomato/Swiggy redirect URLs
        function getRestaurantsForFood(foodName, cuisine) {
            // Encode the food name for URL
            const encodedFood = encodeURIComponent(foodName);
            
            return [
                { name: "FoodHub Premium", icon: "🍽️", rating: 4.8, price: "₹400 for two", 
                  zomatoUrl: `https://www.zomato.com/ncr/restaurants?q=${encodedFood}`, 
                  swiggyUrl: `https://www.swiggy.com/search?query=${encodedFood}` },
                { name: "Taste Junction", icon: "🍜", rating: 4.6, price: "₹350 for two",
                  zomatoUrl: `https://www.zomato.com/ncr/restaurants?q=${encodedFood}`,
                  swiggyUrl: `https://www.swiggy.com/search?query=${encodedFood}` },
                { name: "Spice Garden", icon: "🌶️", rating: 4.7, price: "₹450 for two",
                  zomatoUrl: `https://www.zomato.com/ncr/restaurants?q=${encodedFood}`,
                  swiggyUrl: null },
                { name: "Urban Bite", icon: "🏙️", rating: 4.5, price: "₹380 for two",
                  zomatoUrl: null,
                  swiggyUrl: `https://www.swiggy.com/search?query=${encodedFood}` },
                { name: "Royal Dine", icon: "👑", rating: 4.9, price: "₹600 for two",
                  zomatoUrl: `https://www.zomato.com/ncr/restaurants?q=${encodedFood}`,
                  swiggyUrl: `https://www.swiggy.com/search?query=${encodedFood}` }
            ];
        }

        let currentCuisine = null;
        let currentDiet = "veg";
        let selectedFood = null;

        // Diet Toggle
        document.querySelectorAll('.toggle-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.toggle-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                currentDiet = opt.dataset.diet;
                if(currentCuisine) {
                    loadFoods();
                }
            });
        });

        function loadFoods() {
            if(!currentCuisine) return;
            
            const foods = foodDatabase[currentCuisine][currentDiet];
            const foodsGrid = document.getElementById('foodsGrid');
            
            if(!foods || foods.length === 0) {
                foodsGrid.innerHTML = '<div class="no-items">No foods found for this diet preference</div>';
                return;
            }
            
            foodsGrid.innerHTML = foods.map(food => `
                <div class="food-card" onclick="selectFood('${food.name.replace(/'/g, "\\'")}', '${currentCuisine}')">
                    <div class="food-veg-badge ${food.veg ? 'veg' : 'nonveg'}"></div>
                    <div class="food-icon">${food.icon}</div>
                    <div class="food-name">${food.name}</div>
                    <div class="food-price">${food.price}</div>
                </div>
            `).join('');
        }

        function selectFood(foodName, cuisine) {
            selectedFood = foodName;
            document.getElementById('selectedInfo').classList.add('visible');
            document.getElementById('selectedFoodName').innerHTML = foodName;
            
            const restaurants = getRestaurantsForFood(foodName, cuisine);
            const restaurantsGrid = document.getElementById('restaurantsGrid');
            
            restaurantsGrid.innerHTML = restaurants.map(r => `
                <div class="restaurant-card">
                    <div class="restaurant-header">
                        <div class="restaurant-icon">${r.icon}</div>
                        <div style="flex:1">
                            <div class="restaurant-name">${r.name}</div>
                            <div class="restaurant-rating">
                                ${'★'.repeat(Math.floor(r.rating))}${r.rating % 1 >= 0.5 ? '½' : ''} ${r.rating}/5
                            </div>
                        </div>
                    </div>
                    <div class="restaurant-price">💰 ${r.price}</div>
                    <div class="order-buttons">
                        ${r.zomatoUrl ? `<button class="order-btn zomato" onclick="orderFood('${foodName.replace(/'/g, "\\'")}', '${r.zomatoUrl}', 'zomato')"><i class="fas fa-motorcycle"></i> Order on Zomato</button>` : ''}
                        ${r.swiggyUrl ? `<button class="order-btn swiggy" onclick="orderFood('${foodName.replace(/'/g, "\\'")}', '${r.swiggyUrl}', 'swiggy')"><i class="fas fa-hotel"></i> Order on Swiggy</button>` : ''}
                    </div>
                </div>
            `).join('');
            
            document.getElementById('restaurantsGrid').scrollIntoView({ behavior: 'smooth' });
        }

        function orderFood(foodName, url, platform) {
            window.open(url, '_blank');
            showNotification(`🍽️ Opening ${platform.toUpperCase()} to order ${foodName}!`);
        }

        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.style.cssText = `position:fixed; bottom:100px; right:30px; background:linear-gradient(135deg,#ff6b4a,#ffb44a); color:#000; padding:14px 28px; border-radius:50px; font-weight:600; z-index:1000; animation:fadeInOut 2s ease; box-shadow:0 5px 20px rgba(0,0,0,0.3);`;
            notif.innerHTML = `<i class="fas fa-utensils"></i> ${msg}`;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }

        // Cuisine selection
        document.querySelectorAll('.cuisine-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cuisine-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCuisine = btn.dataset.cuisine;
                loadFoods();
                document.getElementById('selectedInfo').classList.remove('visible');
                document.getElementById('restaurantsGrid').innerHTML = '<div class="no-items">✨ Click any food to see restaurants ✨</div>';
            });
        });

        const style = document.createElement('style');
        style.textContent = `@keyframes fadeInOut{0%{opacity:0;transform:translateX(50px);}20%{opacity:1;transform:translateX(0);}80%{opacity:1;transform:translateX(0);}100%{opacity:0;transform:translateX(50px);}}`;
        document.head.appendChild(style);
    </script>
</body>
</html>
