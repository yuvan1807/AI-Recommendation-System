<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Smart | AI-Powered Learning Platform Recommender</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Premium Animated Background */
        .learn-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 30%, #0a1a2a 0%, #0a0a0a 100%);
            z-index: -3;
        }

        .learn-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(74,158,255,0.12), transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(74,255,158,0.12), transparent 50%);
            z-index: -2;
            animation: learnPulse 8s ease infinite;
        }

        @keyframes learnPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Floating Learning Particles */
        .learn-particle {
            position: fixed;
            font-size: 1rem;
            opacity: 0.08;
            pointer-events: none;
            animation: floatLearn 20s linear infinite;
            z-index: -1;
        }

        @keyframes floatLearn {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.1; }
            90% { opacity: 0.1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 25px 50px;
            position: relative;
            z-index: 2;
        }

        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            padding: 12px 28px;
            border-radius: 60px;
            text-decoration: none;
            color: white;
            margin-bottom: 40px;
            transition: all 0.3s ease;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .back-btn:hover {
            background: linear-gradient(135deg, #4a9eff, #4aff9e);
            transform: translateX(-8px);
        }

        /* Header */
        .premium-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .learn-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, rgba(74,158,255,0.2), rgba(74,255,158,0.2));
            backdrop-filter: blur(20px);
            padding: 10px 28px;
            border-radius: 60px;
            margin-bottom: 25px;
            border: 1px solid rgba(74,158,255,0.3);
            animation: learnBorderPulse 2s infinite;
        }

        @keyframes learnBorderPulse {
            0%, 100% { border-color: rgba(74,158,255,0.3); box-shadow: 0 0 0 0 rgba(74,158,255,0.2); }
            50% { border-color: rgba(74,158,255,0.8); box-shadow: 0 0 25px rgba(74,158,255,0.3); }
        }

        .gradient-text {
            background: linear-gradient(135deg, #4a9eff, #4aff9e, #ffb44a);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 4s ease infinite;
        }

        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            font-family: 'Orbitron', monospace;
        }

        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
        }

        /* Career Details Form */
        .form-section {
            background: rgba(15, 15, 35, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .form-title {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: #4a9eff;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4a9eff;
            background: rgba(74,158,255,0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .submit-btn {
            background: linear-gradient(135deg, #4a9eff, #4aff9e);
            border: none;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #000;
            width: 100%;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(74,158,255,0.3);
        }

        /* Platforms Section */
        .platforms-section {
            display: none;
            margin-top: 30px;
        }

        .platforms-section.visible {
            display: block;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-info-card {
            background: linear-gradient(135deg, rgba(74,158,255,0.15), rgba(74,255,158,0.1));
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(74,158,255,0.3);
            text-align: center;
        }

        .user-info-card h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .user-info-card p {
            color: rgba(255,255,255,0.7);
        }

        .platforms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .platform-card {
            background: linear-gradient(135deg, rgba(25, 25, 55, 0.7), rgba(15, 15, 35, 0.7));
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 25px;
            transition: all 0.4s ease;
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .platform-card:hover {
            transform: translateY(-10px);
            border-color: #4a9eff;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }

        .platform-card::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, #4a9eff, #4aff9e);
            background-size: 400% 400%;
            border-radius: 28px;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
        }

        .platform-card:hover::after {
            opacity: 0.5;
        }

        .platform-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .platform-icon {
            font-size: 2.5rem;
        }

        .platform-name {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .platform-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 5px;
            color: #ffc107;
            font-size: 0.8rem;
        }

        .platform-desc {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .platform-courses {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .course-tag {
            background: rgba(74,158,255,0.15);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #4a9eff;
        }

        .visit-btn {
            background: linear-gradient(135deg, #4a9eff, #4aff9e);
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #000;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            justify-content: center;
        }

        .visit-btn:hover {
            transform: scale(1.02);
        }

        .no-platforms {
            text-align: center;
            padding: 60px;
            color: rgba(255,255,255,0.4);
            grid-column: 1 / -1;
        }

        .footer {
            text-align: center;
            margin-top: 55px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            h1 { font-size: 2rem; }
            .form-row { grid-template-columns: 1fr; }
            .platforms-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="learn-bg"></div>
    <div class="learn-glow"></div>

    <div class="container">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> BACK TO HOME
        </a>

        <div class="premium-header">
            <div class="learn-badge">
                <i class="fas fa-graduation-cap"></i> AI-POWERED LEARNING PLATFORM RECOMMENDER
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h1><span class="gradient-text">LEARN</span> SMART</h1>
            <p class="subtitle">✨ Tell us about your career goals | Get personalized platform recommendations ✨</p>
        </div>

        <!-- Career Details Form -->
        <div class="form-section" id="formSection">
            <div class="form-title">
                <i class="fas fa-user-graduate"></i> TELL US ABOUT YOURSELF
            </div>
            <form id="careerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> FULL NAME</label>
                        <input type="text" id="fullName" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> EMAIL</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-code"></i> CURRENT SKILLS</label>
                        <input type="text" id="skills" placeholder="e.g., Python, Java, Web Development" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-bullseye"></i> CAREER GOAL</label>
                        <select id="careerGoal" required>
                            <option value="">Select your goal</option>
                            <option value="ai_ml">AI/ML Engineer</option>
                            <option value="web_dev">Full Stack Web Developer</option>
                            <option value="data_science">Data Scientist</option>
                            <option value="cloud_dev">Cloud/DevOps Engineer</option>
                            <option value="mobile_dev">Mobile App Developer</option>
                            <option value="cybersecurity">Cybersecurity Expert</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-chart-line"></i> EXPERIENCE LEVEL</label>
                        <select id="experience" required>
                            <option value="">Select experience</option>
                            <option value="beginner">Beginner (0-1 years)</option>
                            <option value="intermediate">Intermediate (1-3 years)</option>
                            <option value="advanced">Advanced (3+ years)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-clock"></i> TIME PER WEEK</label>
                        <select id="timeCommitment" required>
                            <option value="">Select time commitment</option>
                            <option value="casual">Casual (2-5 hours/week)</option>
                            <option value="dedicated">Dedicated (5-10 hours/week)</option>
                            <option value="intensive">Intensive (10+ hours/week)</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="submit-btn">
                    <i class="fas fa-magic"></i> FIND MY LEARNING PLATFORMS
                </button>
            </form>
        </div>

        <!-- Platforms Section -->
        <div class="platforms-section" id="platformsSection">
            <div class="user-info-card" id="userInfoCard"></div>
            <div class="platforms-grid" id="platformsGrid"></div>
        </div>

        <div class="footer">
            <i class="fas fa-robot"></i> 15+ PREMIUM LEARNING PLATFORMS | AI CURATED | DIRECT ACCESS
        </div>
    </div>

            web_dev: {

                    { name: "Pluralsight", icon: "🔷", rating: 4.6, url: "https://www.pluralsight.com", desc: "Tech skill development platform", courses: ["ASP.NET Core", "Angular", "Python"] }

                advanced: [
                    { name: "Harvard Online", icon: "🏛️", rating: 4.9, url: "https://online-learning.harvard.edu", desc: "Harvard data science courses", courses: ["Data Science Professional Certificate", "Python for Research"] }

            },
            cloud_dev: {

                    { name: "Google Cloud Training", icon: "🔷", rating: 4.6, url: "https://cloud.google.com/training", desc: "Google Cloud certification prep", courses: ["Cloud Digital Leader", "Associate Cloud Engineer"] }
                ],
                intermediate: [
                    { name: "A Cloud Guru", icon: "🧘", rating: 4.8, url: "https://acloudguru.com", desc: "Cloud certification training", courses: ["AWS Solutions Architect", "Azure Administrator"] },
                    { name: "Linux Academy", icon: "🐧", rating: 4.7, url: "https://linuxacademy.com", desc: "DevOps and cloud training", courses: ["DevOps", "Kubernetes", "Terraform"] }

                ],

                    { name: "PortSwigger Web Security", icon: "🌐", rating: 4.9, url: "https://portswigger.net/web-security", desc: "Free web security training", courses: ["SQL Injection", "XSS", "CSRF"] }
                ]

        };

        let userData = {};

        // Form submission
        document.getElementById('careerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            userData = {
                name: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                skills: document.getElementById('skills').value,
                careerGoal: document.getElementById('careerGoal').value,
                experience: document.getElementById('experience').value,
                timeCommitment: document.getElementById('timeCommitment').value
            };
            
            if(!userData.careerGoal || !userData.experience) {
                alert('Please fill all fields!');
                return;
            }
            
            displayRecommendations();
        });
        
        function getCareerGoalName(goal) {
            const goals = {
                'ai_ml': 'AI/ML Engineer',
                'web_dev': 'Full Stack Web Developer',
                'data_science': 'Data Scientist',
                'cloud_dev': 'Cloud/DevOps Engineer',
                'mobile_dev': 'Mobile App Developer',
                'cybersecurity': 'Cybersecurity Expert'
            };
            return goals[goal] || goal;
        }
        
        function getExperienceName(exp) {
            const exps = {
                'beginner': 'Beginner (0-1 years)',
                'intermediate': 'Intermediate (1-3 years)',
                'advanced': 'Advanced (3+ years)'
            };
            return exps[exp] || exp;
        }
        
        function displayRecommendations() {
            const careerGoal = userData.careerGoal;
            const experience = userData.experience;
            
            const recommendedPlatforms = platforms[careerGoal]?.[experience] || [];
            
            // Show user info card
            const userInfoCard = document.getElementById('userInfoCard');
            userInfoCard.innerHTML = `
                <h3><i class="fas fa-user-check"></i> Welcome, ${userData.name}!</h3>
                <p><strong>🎯 Career Goal:</strong> ${getCareerGoalName(userData.careerGoal)}</p>
                <p><strong>📚 Experience Level:</strong> ${getExperienceName(userData.experience)}</p>
                <p><strong>💻 Your Skills:</strong> ${userData.skills}</p>
                <p><strong>⏰ Time Commitment:</strong> ${userData.timeCommitment}</p>
                <p style="margin-top: 10px; color: #4a9eff;">✨ Here are the best learning platforms for you ✨</p>
            `;
            
            // Show platforms
            const platformsGrid = document.getElementById('platformsGrid');
            const platformsSection = document.getElementById('platformsSection');
            
            if(!recommendedPlatforms || recommendedPlatforms.length === 0) {
                platformsGrid.innerHTML = '<div class="no-platforms">No platforms found for your criteria. Try a different career path!</div>';
                platformsSection.classList.add('visible');
                return;
            }
            
            platformsGrid.innerHTML = recommendedPlatforms.map(platform => `
                <div class="platform-card" onclick="visitPlatform('${platform.url}')">
                    <div class="platform-header">
                        <div class="platform-icon">${platform.icon}</div>
                        <div>
                            <div class="platform-name">${platform.name}</div>
                            <div class="platform-rating">
                                ${'★'.repeat(Math.floor(platform.rating))}${platform.rating % 1 >= 0.5 ? '½' : ''} ${platform.rating}/5
                            </div>
                        </div>
                    </div>
                    <div class="platform-desc">${platform.desc}</div>
                    <div class="platform-courses">
                        ${platform.courses.slice(0, 3).map(course => `<span class="course-tag">${course}</span>`).join('')}
                    </div>
                    <button class="visit-btn">
                        <i class="fas fa-external-link-alt"></i> VISIT PLATFORM
                    </button>
                </div>
            `).join('');
            
            platformsSection.classList.add('visible');
            
            // Scroll to platforms
            platformsSection.scrollIntoView({ behavior: 'smooth' });
        }
        
        function visitPlatform(url) {
            window.open(url, '_blank');
            showNotification(`📚 Opening learning platform...`);
        }
        
        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.style.cssText = `position:fixed; bottom:100px; right:30px; background:linear-gradient(135deg,#4a9eff,#4aff9e); color:#000; padding:14px 28px; border-radius:50px; font-weight:600; z-index:1000; animation:fadeInOut 2s ease;`;
            notif.innerHTML = `<i class="fas fa-graduation-cap"></i> ${msg}`;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }
        
        const style = document.createElement('style');
        style.textContent = `@keyframes fadeInOut{0%{opacity:0;transform:translateX(50px);}20%{opacity:1;transform:translateX(0);}80%{opacity:1;transform:translateX(0);}100%{opacity:0;transform:translateX(50px);}}`;
        document.head.appendChild(style);
    </script>
</body>
</html>
