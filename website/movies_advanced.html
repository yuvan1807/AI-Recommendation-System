<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CINEMA SPECTRUM | 4D Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #000000;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* 4D Animated Background */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, #0a0a2a 0%, #000000 100%);
            z-index: -3;
        }

        /* Animated Gradient Overlay */
        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,74,74,0.08), transparent 60%),
                        radial-gradient(circle at 80% 80%, rgba(74,158,255,0.08), transparent 60%);
            z-index: -2;
            animation: breathe 8s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* Shooting Stars */
        .shooting-star {
            position: fixed;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
            animation: shoot 4s linear infinite;
            opacity: 0;
            z-index: -1;
        }

        @keyframes shoot {
            0% {
                transform: translateX(0) translateY(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            20% {
                transform: translateX(-200px) translateY(200px);
                opacity: 0;
            }
            100% {
                transform: translateX(-200px) translateY(200px);
                opacity: 0;
            }
        }

        /* Floating Particles */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: floatParticle 15s linear infinite;
            z-index: -1;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 25px 50px;
            position: relative;
            z-index: 2;
        }

        /* Premium Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(20px);
            padding: 12px 28px;
            border-radius: 60px;
            text-decoration: none;
            color: white;
            margin-bottom: 40px;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.15);
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .back-btn i {
            transition: transform 0.3s ease;
        }

        .back-btn:hover {
            background: linear-gradient(135deg, #ff4a4a, #ffb44a);
            transform: translateX(-8px);
            border-color: transparent;
            box-shadow: 0 10px 30px rgba(255,74,74,0.4);
        }

        .back-btn:hover i {
            transform: translateX(-5px);
        }

        /* Premium Header */
        .header {
            text-align: center;
            margin-bottom: 55px;
        }

        .premium-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, rgba(255,74,74,0.15), rgba(255,180,74,0.1));
            backdrop-filter: blur(20px);
            padding: 10px 28px;
            border-radius: 60px;
            font-size: 0.85rem;
            margin-bottom: 25px;
            border: 1px solid rgba(255,74,74,0.4);
            letter-spacing: 1px;
            font-weight: 600;
            animation: borderGlow 2s infinite;
        }

        @keyframes borderGlow {
            0%, 100% { border-color: rgba(255,74,74,0.4); box-shadow: 0 0 0 0 rgba(255,74,74,0.2); }
            50% { border-color: rgba(255,74,74,0.9); box-shadow: 0 0 25px rgba(255,74,74,0.4); }
        }

        .premium-badge i {
            color: #ffb44a;
        }

        h1 {
            font-size: 4.2rem;
            font-weight: 800;
            margin-bottom: 15px;
            font-family: 'Orbitron', monospace;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff, #ff4a4a, #ffb44a, #4aff9e, #4a9eff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textFlow 6s ease infinite;
        }

        @keyframes textFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .glow-text {
            text-shadow: 0 0 30px rgba(255,74,74,0.5);
        }

        .subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* Premium Sections */
        .premium-section {
            background: rgba(15, 15, 30, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 28px 30px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.4s ease;
        }

        .premium-section:hover {
            border-color: rgba(255,74,74,0.3);
            transform: translateY(-2px);
            background: rgba(20, 20, 40, 0.5);
        }

        .section-title {
            font-size: 1.3rem;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .section-title i {
            color: #ff4a4a;
            font-size: 1.5rem;
        }

        /* Premium Buttons */
        .lang-buttons, .genre-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }

        .lang-btn, .genre-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .lang-btn::before, .genre-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s;
        }

        .lang-btn:hover::before, .genre-btn:hover::before {
            left: 100%;
        }

        .lang-btn:hover, .genre-btn:hover {
            transform: translateY(-3px);
            border-color: rgba(255,74,74,0.5);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .lang-btn.active, .genre-btn.active {
            background: linear-gradient(135deg, #ff4a4a, #ffb44a);
            color: white;
            border-color: transparent;
            box-shadow: 0 8px 25px rgba(255,74,74,0.4);
        }

        /* Premium Info Card */
        .info-card {
            background: linear-gradient(135deg, rgba(255,74,74,0.12), rgba(255,180,74,0.08));
            border-radius: 24px;
            padding: 18px 28px;
            text-align: center;
            border: 1px solid rgba(255,74,74,0.25);
            margin-bottom: 38px;
            backdrop-filter: blur(20px);
        }

        .info-card i {
            color: #ffb44a;
            margin-right: 10px;
        }

        .info-card span {
            color: #ff4a4a;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .movie-badge-count {
            display: inline-block;
            background: linear-gradient(135deg, #ff4a4a, #ffb44a);
            padding: 4px 14px;
            border-radius: 30px;
            margin-left: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            color: white;
            animation: badgePulse 1.5s infinite;
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Premium Movie Grid */
        .premium-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 28px;
            margin-top: 30px;
        }

        /* Premium Movie Card */
        .premium-card {
            position: relative;
            background: linear-gradient(135deg, rgba(20, 20, 45, 0.7), rgba(10, 10, 25, 0.7));
            backdrop-filter: blur(12px);
            border-radius: 28px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255,255,255,0.08);
            transform-style: preserve-3d;
        }

        /* 3D Hover Effect */
        .premium-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(255,74,74,0.6);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 20px rgba(255,74,74,0.2);
        }

        /* Glow Border Animation */
        .premium-card::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, #ff4a4a, #ffb44a, #4aff9e, #4a9eff);
            background-size: 300% 300%;
            border-radius: 28px;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: -1;
        }

        .premium-card:hover::after {
            opacity: 0.6;
            animation: borderRotate 2s linear infinite;
        }

        @keyframes borderRotate {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Premium Card Content */
        .card-content {
            padding: 30px 20px;
            text-align: center;
            min-height: 260px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        /* Multi-color gradients */
        .premium-card[data-color="0"] .card-content { background: linear-gradient(135deg, #1a1a2e, #16213e); }
        .premium-card[data-color="1"] .card-content { background: linear-gradient(135deg, #2d1b4e, #1a1a2e); }
        .premium-card[data-color="2"] .card-content { background: linear-gradient(135deg, #1e3a5f, #0f3460); }
        .premium-card[data-color="3"] .card-content { background: linear-gradient(135deg, #3d2b1f, #1a1a2e); }
        .premium-card[data-color="4"] .card-content { background: linear-gradient(135deg, #2e1f3d, #1a1a2e); }
        .premium-card[data-color="5"] .card-content { background: linear-gradient(135deg, #1f3d2e, #16213e); }
        .premium-card[data-color="6"] .card-content { background: linear-gradient(135deg, #4a1a2e, #2e1a2e); }
        .premium-card[data-color="7"] .card-content { background: linear-gradient(135deg, #1a2e4a, #0f3460); }

        /* Movie Title - Premium Style */
        .movie-title-premium {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            letter-spacing: -0.3px;
            transition: all 0.3s ease;
            font-family: 'Orbitron', monospace;
        }

        .premium-card:hover .movie-title-premium {
            text-shadow: 0 0 15px rgba(255,74,74,0.8);
            letter-spacing: 0.5px;
        }

        .movie-year-premium {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Premium Stars */
        .premium-stars {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin: 12px 0;
        }

        .premium-stars i {
            font-size: 0.9rem;
            color: #ffc107;
            animation: starGlow 0.5s ease;
        }

        @keyframes starGlow {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .rating-value {
            font-size: 0.9rem;
            font-weight: 700;
            color: #ffc107;
        }

        /* Hover Details Panel */
        .hover-details {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 10;
            border-radius: 28px;
        }

        .premium-card:hover .hover-details {
            opacity: 1;
        }

        .detail-btn {
            background: linear-gradient(135deg, #ff4a4a, #ffb44a);
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }

        .detail-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(255,74,74,0.5);
        }

        .no-movies {
            text-align: center;
            padding: 60px;
            color: rgba(255,255,255,0.4);
            font-size: 1.1rem;
            grid-column: 1 / -1;
        }

        .genre-section {
            display: none;
        }

        .genre-section.visible {
            display: block;
            animation: fadeSlideUp 0.5s ease;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden {
            display: none;
        }

        /* Premium Footer */
        .premium-footer {
            text-align: center;
            margin-top: 55px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.35);
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #ff4a4a, #ffb44a);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ff4a4a;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .premium-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 800px) {
            .premium-grid { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 2.5rem; }
            .container { padding: 15px 15px 40px; }
        }
        @media (max-width: 500px) {
            .premium-grid { grid-template-columns: 1fr; }
            .lang-btn, .genre-btn { padding: 8px 18px; font-size: 0.8rem; }
            .movie-title-premium { font-size: 1rem; }
        }
    </style>
</head>

        // DOM Elements
        const genreSection = document.getElementById('genreSection');
        const selectedInfo = document.getElementById('selectedInfo');
        const selectedLangSpan = document.getElementById('selectedLang');
        const selectedGenreSpan = document.getElementById('selectedGenre');
        const movieCountSpan = document.getElementById('movieCount');
        const moviesGrid = document.getElementById('moviesGrid');

        let currentLang = null;
        let currentGenre = null;

        // Language Selection
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLang = btn.dataset.lang;
                currentGenre = null;
                genreSection.classList.add('visible');
                document.querySelectorAll('.genre-btn').forEach(g => g.classList.remove('active'));
                moviesGrid.innerHTML = '<div class="no-movies"><i class="fas fa-crown" style="font-size: 3rem; margin-bottom: 20px; display: block;"></i>SELECT A GENRE TO CONTINUE</div>';
                selectedInfo.classList.remove('hidden');
                selectedLangSpan.textContent = currentLang.toUpperCase();
                selectedGenreSpan.textContent = '?';
                movieCountSpan.textContent = '0';
            });
        });

        // Genre Selection
        document.querySelectorAll('.genre-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!currentLang) {
                    alert('✨ PLEASE SELECT A LANGUAGE FIRST ✨');
                    return;
                }
                document.querySelectorAll('.genre-btn').forEach(g => g.classList.remove('active'));
                btn.classList.add('active');
                currentGenre = btn.dataset.genre;
                selectedGenreSpan.textContent = currentGenre.toUpperCase();
                displayMovies();
            });
        });

        // Card Click Handler
        function handleCardClick(card, title, year) {
            card.style.transform = 'scale(0.98)';
            setTimeout(() => { card.style.transform = ''; }, 150);
            
            const rating = (4.0 + (Math.random() * 0.9)).toFixed(1);
            const stars = '⭐'.repeat(Math.floor(rating)) + (rating % 1 >= 0.5 ? '½' : '');
            
            alert(`🎬 ${title} (${year})\n\n📊 RATING: ${stars} ${rating}/5\n🎭 GENRE: ${currentGenre?.toUpperCase()}\n🍿 PREMIUM 4D EXPERIENCE`);
        }

        function showDetails(title, year, genre, rating, event) {
            event.stopPropagation();
            const stars = '⭐'.repeat(Math.floor(rating)) + (rating % 1 >= 0.5 ? '½' : '');
            alert(`🎬 ${title} (${year})\n📝 Premium ${genre} masterpiece from ${year}\n📊 ${stars} ${rating}/5\n✨ Experience the cinematic magic!`);
        }

        // Display Movies
        function displayMovies() {
            if (!currentLang || !currentGenre) return;
            
            const movies = movieDB[currentLang]?.[currentGenre];
            if (!movies || movies.length === 0) {
                moviesGrid.innerHTML = '<div class="no-movies"><i class="fas fa-crown" style="font-size: 3rem; margin-bottom: 20px; display: block;"></i>PREMIUM MOVIES LOADING SOON</div>';
                movieCountSpan.textContent = '0';
                return;
            }
            
            movieCountSpan.textContent = movies.length;
            
            moviesGrid.innerHTML = movies.map((movie, index) => {
                const colorIndex = index % 8;
                const year = 2010 + (index % 16);
                const rating = (4.0 + (index % 10) / 10).toFixed(1);
                const fullStars = Math.floor(rating);
                const hasHalf = rating % 1 >= 0.5;
                
                return `
                    <div class="premium-card" data-color="${colorIndex}" onclick="handleCardClick(this, '${movie.replace(/'/g, "\\'")}', '${year}')">
                        <div class="card-content">
                            <div class="movie-title-premium">${movie}</div>
                            <div class="movie-year-premium">
                                <i class="far fa-calendar-alt"></i> ${year}
                            </div>
                            <div class="premium-stars">
                                ${'<i class="fas fa-star"></i>'.repeat(fullStars)}
                                ${hasHalf ? '<i class="fas fa-star-half-alt"></i>' : ''}
                                ${'<i class="far fa-star"></i>'.repeat(5 - fullStars - (hasHalf ? 1 : 0))}
                            </div>
                            <div class="rating-value">${rating} / 5</div>
                        </div>
                        <div class="hover-details">
                            <button class="detail-btn" onclick="showDetails('${movie.replace(/'/g, "\\'")}', '${year}', '${currentGenre}', '${rating}', event)">
                                <i class="fas fa-info-circle"></i> VIEW DETAILS
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
